<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jackiesteed</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><style>@import url('https://fonts.googleapis.com/css2?family=Great+Vibes');</style><text x='50%25' y='75%25' text-anchor='middle' font-family='Great Vibes' font-size='52' fill='%232e7272'>J</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .english-easter-egg {
      position: fixed;
      top: 20px;
      right: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(46, 114, 114, .16);
      border-radius: 999px;
      background: rgba(255, 255, 255, .86);
      color: #2e7272;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(46, 114, 114, .12);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .english-easter-egg:hover {
      transform: translateY(-2px);
      background: #fff;
      box-shadow: 0 14px 30px rgba(46, 114, 114, .18);
    }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: 10vw;
      color: #2e7272;
      letter-spacing: 0.05em;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <a class="english-easter-egg" href="spell/" aria-label="Open English spelling game">English</a>
  <h1>Jackiesteed</h1>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>三年级上 · 单词拼写</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #ffeef5;
    --bg-2: #f3e8ff;
    --bg-3: #e0f2ff;
    --card: #ffffff;
    --ink: #2d2a4a;
    --muted: #9094b0;
    --accent: #ff7eb3;
    --accent-2: #8a7dff;
    --accent-3: #5cd2ff;
    --good: #36d399;
    --bad: #ff6b6b;
    --shadow-lg: 0 30px 80px -20px rgba(120, 90, 180, .25), 0 12px 30px -10px rgba(120, 90, 180, .15);
    --shadow-md: 0 8px 24px rgba(140, 110, 200, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Fredoka", "Quicksand", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100vh;
    background:
      radial-gradient(900px 600px at 10% 0%, #ffd6e8 0%, transparent 55%),
      radial-gradient(900px 700px at 100% 20%, #d6e5ff 0%, transparent 55%),
      radial-gradient(800px 600px at 50% 100%, #fff0d6 0%, transparent 55%),
      linear-gradient(135deg, #fff5fb 0%, #f0f0ff 50%, #eaf6ff 100%);
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* === sidebar === */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-right: 1px solid rgba(255,255,255,.6);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    box-shadow: 4px 0 30px rgba(140, 110, 200, .06);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 18px;
    border-bottom: 1px dashed rgba(140, 110, 200, .2);
    margin-bottom: 14px;
  }
  .brand-logo {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 16px rgba(255, 126, 179, .35);
  }
  .brand-title {
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.2;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .5px;
  }
  .sidebar h2 {
    margin: 4px 8px 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .units {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .unit-btn {
    border: none;
    background: transparent;
    color: var(--ink);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s cubic-bezier(.4, 0, .2, 1);
    text-align: left;
    line-height: 1.35;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
  }
  .unit-num {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(140, 110, 200, .1);
    color: var(--accent-2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all .2s;
  }
  .unit-name { flex: 1; font-size: 13px; }
  .unit-btn:hover {
    background: rgba(255, 255, 255, .8);
    transform: translateX(2px);
  }
  .unit-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 10px 24px rgba(255, 126, 179, .35);
    transform: translateX(2px);
  }
  .unit-btn.active .unit-num {
    background: rgba(255,255,255,.25);
    color: #fff;
  }

  /* === main === */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
    min-height: 100vh;
    position: relative;
  }
  .topbar {
    position: absolute;
    top: 24px;
    left: 32px;
    right: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    opacity: .7;
    letter-spacing: .5px;
  }
  .progress-pill {
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.8);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    pointer-events: auto;
    box-shadow: var(--shadow-md);
  }
  .progress-pill .ok { color: var(--good); }

  @media (max-width: 480px) {
    .sidebar {
      width: 130px;
      padding: 16px 8px;
    }
    .brand-title { font-size: 13px; }
    .brand-sub { display: none; }
    .unit-btn { padding: 9px 8px; }
    .unit-name { font-size: 11px; }
    .topbar { left: 16px; right: 16px; top: 16px; }
    .topbar h1 { font-size: 15px; }
    .main { padding: 18px 10px 30px; }
  }

  /* === card === */
  .card {
    position: relative;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,.9);
    border-radius: 40px;
    box-shadow: var(--shadow-lg);
    padding: 5vh 4vw;
    width: calc((100vw - 220px) * 0.85);
    height: 80vh;
    max-width: 1100px;
    max-height: 840px;
    min-width: 360px;
    min-height: 460px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    animation: cardIn .6s cubic-bezier(.2, .8, .3, 1.2);
  }
  .card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    padding: 2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    opacity: .35;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(.94) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .card.success { animation: cardSuccess .6s cubic-bezier(.2, .8, .3, 1.4); }
  @keyframes cardSuccess {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03); box-shadow: 0 30px 80px -10px rgba(54, 211, 153, .4); }
    100% { transform: scale(1); }
  }

  .emoji {
    font-size: clamp(72px, 14vh, 180px);
    line-height: 1;
    user-select: none;
    filter: drop-shadow(0 8px 16px rgba(120, 90, 180, .15));
    transition: transform .3s;
  }
  .card.success .emoji { animation: bounce .6s ease; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-20px) scale(1.15) rotate(-5deg); }
    60% { transform: translateY(-8px) scale(1.05) rotate(3deg); }
  }
  .meaning {
    font-size: clamp(32px, 5.2vh, 64px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--ink) 0%, #5b4b8a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .word {
    font-size: clamp(44px, 6.5vh, 80px);
    font-weight: 700;
    letter-spacing: 6px;
    margin: 0;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  .boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }
  .boxes.shake { animation: shake .4s; }
  .box {
    width: clamp(54px, 8vh, 92px);
    height: clamp(66px, 10vh, 112px);
    border-radius: 18px;
    border: 3px solid rgba(140, 110, 200, .12);
    background: rgba(255,255,255,.6);
    font-size: clamp(36px, 5.5vh, 60px);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: lowercase;
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    transition: all .25s cubic-bezier(.4, 0, .2, 1);
    user-select: none;
    box-shadow: 0 4px 12px rgba(140, 110, 200, .06);
  }
  .box.cursor {
    border-color: var(--accent);
    box-shadow: 0 0 0 6px rgba(255, 126, 179, .15), 0 8px 20px rgba(255, 126, 179, .25);
    transform: translateY(-4px);
    background: #fff;
  }
  .box.filled {
    border-color: rgba(138, 125, 255, .3);
    background: linear-gradient(135deg, #fff5fb, #f0f0ff);
  }
  .box.good {
    border-color: var(--good);
    background: linear-gradient(135deg, #e8fbf3, #d0f5e3);
    color: var(--good);
    animation: popIn .35s cubic-bezier(.2, .8, .3, 1.4);
  }
  .box.bad {
    border-color: var(--bad);
    background: linear-gradient(135deg, #ffeded, #ffd6d6);
    color: var(--bad);
  }
  @keyframes popIn {
    0% { transform: scale(.85); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .box.space {
    border: none;
    background: transparent;
    width: 14px;
    box-shadow: none;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* === actions === */
  .actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 480px;
    margin-top: 6px;
  }
  .ghost {
    background: rgba(255,255,255,.8);
    border: 1px solid rgba(140, 110, 200, .15);
    color: var(--ink);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: inherit;
    transition: all .2s;
    box-shadow: 0 4px 12px rgba(140, 110, 200, .08);
  }
  .ghost:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(140, 110, 200, .15);
  }
  .ghost:active { transform: translateY(0); }
  .answer {
    min-height: 26px;
    font-size: 18px;
    color: var(--good);
    font-weight: 700;
    letter-spacing: .5px;
  }
  .answer.bad { color: var(--bad); }
  footer {
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .5px;
  }

  /* === confetti canvas === */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* === floating success badge === */
  .success-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: clamp(60px, 10vh, 120px);
    font-weight: 800;
    color: var(--good);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(.5);
    text-shadow: 0 8px 24px rgba(54, 211, 153, .4);
    z-index: 10;
  }
  .success-badge.show {
    animation: badgePop 1.1s cubic-bezier(.2, .8, .3, 1.4);
  }
  @keyframes badgePop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(.3) rotate(-15deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
    50%  { opacity: 1; transform: translate(-50%, -80%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(.9) rotate(0deg); }
  }

  .egg-layer {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    pointer-events: none;
    z-index: 9;
  }
  .egg-pop {
    position: absolute;
    left: 50%;
    top: 58%;
    min-width: 32px;
    height: 32px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    background: rgba(255,255,255,.88);
    border: 1px solid rgba(255,255,255,.9);
    color: var(--accent-2);
    font-size: 20px;
    font-weight: 800;
    box-shadow: 0 10px 24px rgba(120, 90, 180, .18);
    animation: eggPop var(--egg-time, 1100ms) cubic-bezier(.2, .8, .3, 1) forwards;
    transform: translate(-50%, -50%);
  }
  .egg-pop.star {
    background: transparent;
    border: none;
    box-shadow: none;
    font-size: 26px;
  }
  @keyframes eggPop {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.5) rotate(0deg);
    }
    15% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--egg-x)), calc(-50% + var(--egg-y)))
        scale(1.15)
        rotate(var(--egg-rot));
    }
  }
  .streak-badge {
    position: absolute;
    right: 32px;
    top: 26px;
    padding: 10px 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ffb84d, #ff7eb3);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 14px 30px rgba(255, 126, 179, .32);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-10px) scale(.8);
    z-index: 11;
  }
  .streak-badge.show {
    animation: streakPop 1.2s cubic-bezier(.2, .8, .3, 1.25);
  }
  @keyframes streakPop {
    0%   { opacity: 0; transform: translateY(-10px) scale(.8); }
    18%  { opacity: 1; transform: translateY(0) scale(1.08); }
    70%  { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-18px) scale(.95); }
  }
  .chapter-modal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(45, 42, 74, .25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s ease;
    z-index: 10000;
  }
  .chapter-modal.show {
    opacity: 1;
    pointer-events: auto;
  }
  .chapter-dialog {
    width: min(420px, 100%);
    border-radius: 28px;
    padding: 34px 28px 28px;
    text-align: center;
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.95);
    box-shadow: 0 30px 80px rgba(45, 42, 74, .24);
    transform: translateY(16px) scale(.94);
    transition: transform .22s cubic-bezier(.2, .8, .3, 1.2);
  }
  .chapter-modal.show .chapter-dialog {
    transform: translateY(0) scale(1);
  }
  .chapter-icon {
    font-size: 70px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .chapter-title {
    margin: 0 0 10px;
    font-size: 28px;
    color: var(--ink);
  }
  .chapter-text {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }
  .chapter-action {
    border: none;
    border-radius: 999px;
    padding: 12px 24px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 12px 28px rgba(255, 126, 179, .32);
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">📚</div>
      <div>
        <div class="brand-title">学单词</div>
        <div class="brand-sub">SPELL · 三年级下</div>
      </div>
    </div>
    <h2>单元 Units</h2>
    <div class="units" id="units"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>✨ 跟着课本练拼写</h1>
      <div class="progress-pill"><span class="ok" id="stats">0</span> / <span id="statsTotal">0</span> 答对</div>
    </div>
    <div class="card" id="card">
      <div class="egg-layer" id="eggLayer"></div>
      <div class="success-badge" id="successBadge">🎉</div>
      <div class="streak-badge" id="streakBadge">连对 3 个！</div>
      <div class="emoji" id="emoji">🐣</div>
      <div class="meaning" id="meaning">准备好了吗？</div>
      <div class="word" id="word">— — —</div>
      <div class="boxes" id="boxes"></div>
      <div class="answer" id="answer"></div>
      <div class="actions">
        <button class="ghost" id="speak">🔊 听一听</button>
        <button class="ghost" id="skip">跳过 →</button>
      </div>
    </div>
    <footer>键盘输入 · 拼对自动朗读 + 彩蛋 🎊</footer>
  </main>

  <div class="chapter-modal" id="chapterModal" role="dialog" aria-modal="true" aria-labelledby="chapterTitle">
    <div class="chapter-dialog">
      <div class="chapter-icon">🏆</div>
      <h2 class="chapter-title" id="chapterTitle">恭喜你完成本章！</h2>
      <p class="chapter-text" id="chapterText">你已经完成本章的全部单词。</p>
      <button class="chapter-action" id="chapterClose">继续练习</button>
    </div>
  </div>

<script>
// 三年级下 · 课本词汇（按课本 Appendix 2 录入）
const UNITS = [
  {
    name: "Unit 1 · Where are you from",
    words: [
      { en: "where",     zh: "在哪里；到哪里",       emoji: "📍" },
      { en: "from",      zh: "来自，从……来",         emoji: "➡️" },
      { en: "about",     zh: "关于；大约",           emoji: "💬" },
      { en: "today",     zh: "今天",                 emoji: "📅" },
      { en: "teacher",   zh: "教师",                 emoji: "👩‍🏫" },
      { en: "student",   zh: "学生",                 emoji: "🎒" },
      { en: "after",     zh: "在……后面",             emoji: "⏭️" },
      { en: "who",       zh: "谁；什么人",           emoji: "❓" },
      { en: "girl",      zh: "女孩",                 emoji: "👧" },
      { en: "neighbour", zh: "邻居",                 emoji: "🏘️" },
      { en: "boy",       zh: "男孩",                 emoji: "👦" },
      { en: "woman",     zh: "成年女子；妇女",       emoji: "👩" },
      { en: "man",       zh: "成年男子；男人",       emoji: "👨" },
      { en: "Mr",        zh: "先生",                 emoji: "🎩" },
      { en: "classmate", zh: "同班同学",             emoji: "👫" },
      { en: "he",        zh: "他",                   emoji: "🙋‍♂️" },
      { en: "also",      zh: "也",                   emoji: "➕" },
      { en: "English",   zh: "英语；英语的",         emoji: "🔤" },
      { en: "she",       zh: "她",                   emoji: "🙋‍♀️" },
      { en: "very",      zh: "很；非常；十分",       emoji: "✨" },
      { en: "UK",        zh: "英国",                 emoji: "🇬🇧" },
      { en: "China",     zh: "中国",                 emoji: "🇨🇳" },
      { en: "Canada",    zh: "加拿大",               emoji: "🇨🇦" },
      { en: "USA",       zh: "美国",                 emoji: "🇺🇸" },
    ],
  },
  {
    name: "Unit 2 · My friends",
    words: [
      { en: "has",     zh: "有（have 的第三人称单数）", emoji: "🤲" },
      { en: "long",    zh: "长的",                     emoji: "📏" },
      { en: "body",    zh: "身体",                     emoji: "🧍" },
      { en: "short",   zh: "短的；个子矮的",           emoji: "📐" },
      { en: "leg",     zh: "腿",                       emoji: "🦵" },
      { en: "right",   zh: "正确的，对的",             emoji: "✅" },
      { en: "fat",     zh: "肥的；胖的",               emoji: "🐷" },
      { en: "thin",    zh: "瘦的",                     emoji: "🦴" },

const $ = (id) => document.getElementById(id);
const unitsEl = $("units");
const emojiEl = $("emoji");
const meaningEl = $("meaning");
const wordEl = $("word");
const boxesEl = $("boxes");
const speakEl = $("speak");
const skipEl = $("skip");
const statsEl = $("stats");
const statsTotalEl = $("statsTotal");
const answerEl = $("answer");
const cardEl = $("card");
const eggLayerEl = $("eggLayer");
const successBadgeEl = $("successBadge");
const streakBadgeEl = $("streakBadge");
const chapterModalEl = $("chapterModal");
const chapterTextEl = $("chapterText");
const chapterCloseEl = $("chapterClose");

let currentUnit = 0;
let queue = [];
let current = null;
let streak = 0;
let boxEls = [];       // box div elements (excluding spaces)
let typed = [];        // typed letters (length === boxEls.length when full)
let locked = false;    // lock input briefly after correct/incorrect
const unitProgress = UNITS.map(() => ({
  completed: new Set(),
  notified: false,
}));

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderUnits() {
  unitsEl.innerHTML = "";
  UNITS.forEach((u, i) => {
    const b = document.createElement("button");
    b.className = "unit-btn" + (i === currentUnit ? " active" : "");
    // 提取标题部分（"Unit X · Name" → "Name"）
    const parts = u.name.split("·");
    const subtitle = (parts[1] || u.name).trim();
    b.innerHTML = `<span class="unit-num">${i + 1}</span><span class="unit-name">${subtitle}</span>`;
    b.onclick = () => { closeChapterModal(); currentUnit = i; startUnit(); renderUnits(); };
    unitsEl.appendChild(b);
  });
}

function startUnit() {
  queue = shuffle(UNITS[currentUnit].words);
  streak = 0;
  next();
}

function wordKey(word) {
  return word.trim().toLowerCase();
}

function currentProgress() {
  return unitProgress[currentUnit];
}

function buildBoxes(word) {
  boxesEl.innerHTML = "";
  boxEls = [];
  typed = [];
  word.split("").forEach((ch) => {
    if (ch === " ") {
      const sp = document.createElement("div");
      sp.className = "box space";
      boxesEl.appendChild(sp);
      return;
    }
    const div = document.createElement("div");
    div.className = "box";
    div.dataset.expect = ch.toLowerCase();
    boxesEl.appendChild(div);
    boxEls.push(div);
  });
  updateCursor();
}

function updateCursor() {
  boxEls.forEach((b, i) => {
    b.classList.remove("cursor");
    if (i === typed.length) b.classList.add("cursor");
  });
}

function renderTyped() {
  boxEls.forEach((b, i) => {
    if (i < typed.length) {
      b.textContent = typed[i];
      b.classList.add("filled");
    } else {
      b.textContent = "";
      b.classList.remove("filled");
    }
    b.classList.remove("good", "bad");
  });
  updateCursor();
}

function handleKey(e) {
  if (chapterModalEl.classList.contains("show")) {
    if (e.key === "Enter" || e.key === "Escape") {
      closeChapterModal();
      e.preventDefault();
    }
    return;
  }
  if (locked || !current) return;
  // 忽略修饰键组合
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const key = e.key;
  if (/^[a-zA-Z]$/.test(key)) {
    if (typed.length < boxEls.length) {
      typed.push(key.toLowerCase());
      renderTyped();
      if (typed.length === boxEls.length) checkAll();
    }
    e.preventDefault();
  } else if (key === "Backspace") {
    if (typed.length > 0) {
      typed.pop();
      renderTyped();
    }
    e.preventDefault();
  } else if (key === "Enter") {
    if (typed.length === boxEls.length) checkAll();
    e.preventDefault();
  }
}

function checkAll() {
  if (!current) return;
  const got = typed.join("");
  const expect = current.en.replace(/ /g, "").toLowerCase();
  if (got === expect) {
    streak += 1;
    const progress = currentProgress();
    progress.completed.add(wordKey(current.en));
    boxEls.forEach(b => { b.classList.remove("bad", "filled", "cursor"); b.classList.add("good"); });
    answerEl.textContent = `太棒了！ ${current.en} — ${current.zh}`;
    answerEl.classList.remove("bad");
    speak(current.en);
    updateStats();
    celebrate(current.en, streak);
    maybeShowChapterComplete();
    locked = true;
    setTimeout(() => { locked = false; next(); }, 1500);
  } else {
    streak = 0;
    boxEls.forEach((b, i) => {
      if ((typed[i] || "") === expect[i]) {
        b.classList.add("good");
        b.classList.remove("bad");
      } else {
        b.classList.add("bad");
        b.classList.remove("good");
      }
    });
    boxesEl.classList.add("shake");
    setTimeout(() => boxesEl.classList.remove("shake"), 400);
    answerEl.textContent = `再试一次～`;
    answerEl.classList.add("bad");
    // 保留对的，清掉错的
    const newTyped = [];
    for (let i = 0; i < boxEls.length; i++) {
      if ((typed[i] || "") === expect[i]) {
        newTyped.push(typed[i]);
      } else {
        break;
      }
    }
    typed = newTyped;
    setTimeout(() => { renderTyped(); }, 450);
    updateStats();
  }
}

function next() {
  answerEl.textContent = "";
  answerEl.classList.remove("bad");
  if (queue.length === 0) {
    queue = shuffle(UNITS[currentUnit].words);
  }
  current = queue.shift();
  emojiEl.textContent = current.emoji;
  meaningEl.textContent = current.zh;
  wordEl.textContent = current.en;
  buildBoxes(current.en);
  updateStats();
}

function updateStats() {
  statsEl.textContent = currentProgress().completed.size;
  statsTotalEl.textContent = UNITS[currentUnit].words.length;
}

function maybeShowChapterComplete() {
  const progress = currentProgress();
  const unitTotal = UNITS[currentUnit].words.length;
  if (progress.notified || progress.completed.size < unitTotal) return;

  progress.notified = true;
  const completedUnit = currentUnit;
  setTimeout(() => {
    const unitName = UNITS[completedUnit].name;
    chapterTextEl.textContent = `你已经完成 ${unitTotal} / ${unitTotal} 个单词：${unitName}`;
    chapterModalEl.classList.add("show");
    spawnConfetti(260);
  }, 650);
}

function closeChapterModal() {
  chapterModalEl.classList.remove("show");
}

// 语音
let voice = null;
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  voice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|victoria|karen/i.test(v.name))
       || voices.find(v => /en[-_]US/i.test(v.lang))
       || voices.find(v => /^en/i.test(v.lang))
       || voices[0] || null;
}
if (typeof speechSynthesis !== "undefined") {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text) {
  if (typeof speechSynthesis === "undefined") return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.05;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

// === 彩蛋：confetti + 成功徽章 + chime ===
const confettiCanvas = $("confetti");
const cctx = confettiCanvas.getContext("2d");
let confettiParticles = [];
let confettiRunning = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener("resize", resizeConfetti);

const CONFETTI_COLORS = ["#ff7eb3", "#8a7dff", "#5cd2ff", "#36d399", "#ffb84d", "#ff6b9e", "#a78bfa"];

function spawnConfetti(count = 140) {
  const cardRect = cardEl.getBoundingClientRect();
  const cx = cardRect.left + cardRect.width / 2;
  const cy = cardRect.top + cardRect.height / 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 6 + Math.random() * 10;
    confettiParticles.push({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy + (Math.random() - 0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      gravity: 0.28 + Math.random() * 0.12,
      size: 6 + Math.random() * 8,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.4,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      shape: Math.random() < 0.5 ? "rect" : "circle",
      life: 0,
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    requestAnimationFrame(tickConfetti);
  }
}

function tickConfetti() {
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => {
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life += 1;
    const alpha = Math.max(0, 1 - p.life / 140);
    if (alpha <= 0 || p.y > confettiCanvas.height + 50) return false;
    cctx.save();
    cctx.globalAlpha = alpha;
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot);
    cctx.fillStyle = p.color;
    if (p.shape === "rect") {
      cctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
    } else {
      cctx.beginPath();
      cctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      cctx.fill();
    }
    cctx.restore();
    return true;
  });
  if (confettiParticles.length > 0) {
    requestAnimationFrame(tickConfetti);
  } else {
    confettiRunning = false;
  }
}

// 短促的"叮"音效
let audioCtx = null;
function playChime() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const notes = [880, 1175, 1568]; // A5, D6, G6 — 上行琶音
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, now + i * 0.08);
      g.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + i * 0.08);
      o.stop(now + i * 0.08 + 0.4);
    });
  } catch (e) {}
}

const SUCCESS_EMOJIS = ["🎉", "⭐", "💯", "✨", "🌟", "🏆", "🎊"];
const EGG_SPARKS = ["⭐", "✨", "💫", "🌟", "🎈"];

function restartAnimation(el, className) {
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
}

function createEggPop(text, index, totalItems, className = "") {
  const el = document.createElement("span");
  el.className = `egg-pop ${className}`.trim();
  el.textContent = text;

  const spread = totalItems <= 1 ? 0 : (index / (totalItems - 1)) - 0.5;
  const randomDrift = (Math.random() - 0.5) * 70;
  const x = spread * 440 + randomDrift;
  const y = -150 - Math.random() * 150;
  const rot = (Math.random() - 0.5) * 100;
  el.style.setProperty("--egg-x", `${x}px`);
  el.style.setProperty("--egg-y", `${y}px`);
  el.style.setProperty("--egg-rot", `${rot}deg`);
  el.style.setProperty("--egg-time", `${950 + Math.random() * 350}ms`);
  eggLayerEl.appendChild(el);
  el.addEventListener("animationend", () => el.remove(), { once: true });
}

function burstWord(word) {
  const letters = word.replace(/ /g, "").split("").slice(0, 10);
  letters.forEach((letter, index) => createEggPop(letter, index, letters.length));

  const sparkleCount = Math.min(6, Math.max(3, letters.length));
  for (let i = 0; i < sparkleCount; i++) {
    const sparkle = EGG_SPARKS[Math.floor(Math.random() * EGG_SPARKS.length)];
    createEggPop(sparkle, i, sparkleCount, "star");
  }
}

function showStreak(streakCount) {
  if (streakCount < 3) return;
  streakBadgeEl.textContent = streakCount % 5 === 0
    ? `隐藏奖励：连对 ${streakCount} 个！`
    : `连对 ${streakCount} 个！`;
  restartAnimation(streakBadgeEl, "show");
}

function celebrate(word, streakCount) {
  const confettiCount = streakCount >= 5 && streakCount % 5 === 0 ? 220 : 140;
  spawnConfetti(confettiCount);
  burstWord(word);
  showStreak(streakCount);
  playChime();
  restartAnimation(cardEl, "success");
  successBadgeEl.textContent = SUCCESS_EMOJIS[Math.floor(Math.random() * SUCCESS_EMOJIS.length)];
  restartAnimation(successBadgeEl, "show");
}

document.addEventListener("keydown", handleKey);
speakEl.addEventListener("click", () => current && speak(current.en));
skipEl.addEventListener("click", () => {
  if (!current) return;
  speak(current.en);
  setTimeout(next, 400);
});
chapterCloseEl.addEventListener("click", closeChapterModal);
chapterModalEl.addEventListener("click", (e) => {
  if (e.target === chapterModalEl) closeChapterModal();
});

renderUnits();
startUnit();

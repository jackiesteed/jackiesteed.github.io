<style>

    --shadow: 0 10px 30px rgba(60, 50, 30, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #ffe9c2 0%, var(--bg) 60%) fixed;
    color: var(--ink);

    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    background: rgba(255,255,255,.7);

    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar h2 {
    margin: 4px 8px 14px;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .units {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .unit-btn {
    border: 2px solid transparent;
    background: transparent;
    color: var(--ink);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s ease;
    text-align: left;
    line-height: 1.35;
  }
  .unit-btn:hover { background: #fff5e0; }
  .unit-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(255,159,67,.35);
  }
  .main {
    flex: 1;

    justify-content: center;
    padding: 24px 20px 40px;

  }
  h1 {
    margin: 0 0 18px;

    letter-spacing: .5px;
    position: absolute;
    top: 24px;
  }

    .sidebar {
      width: 120px;
      padding: 14px 6px;
    }

      padding: 8px 8px;
      font-size: 12px;
    }
    .main { padding: 18px 10px 30px; }
  }
  .card {
    background: var(--card);
    border-radius: 32px;
    box-shadow: var(--shadow);
    padding: 4vh 4vw;
    width: 50vw;
    height: 50vh;
    min-width: 360px;
    min-height: 360px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2vh;
  }
  .emoji {
    font-size: clamp(56px, 10vh, 120px);
    line-height: 1;
    user-select: none;
  }
  .meaning {
    font-size: clamp(28px, 4.5vh, 56px);
    font-weight: 700;
  }
  .word {
    font-size: clamp(36px, 5vh, 64px);
    font-weight: 700;
    letter-spacing: 4px;
    margin: 0;
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .boxes.shake { animation: shake .35s; }
  .box {
    width: clamp(44px, 6vh, 72px);
    height: clamp(54px, 7.5vh, 88px);
    border-radius: 14px;
    border: 2px solid #eee;
    background: #fff;
    font-size: clamp(28px, 4vh, 44px);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: lowercase;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    transition: all .15s;
    user-select: none;
  }
  .box.cursor {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,159,67,.18);
    transform: translateY(-2px);
  }
  .box.filled { border-color: #ffd9a3; background: #fff8ec; }
  .box.good { border-color: var(--good); background: #e9f9ee; color: var(--good); }
  .box.bad { border-color: var(--bad); background: #fdecea; color: var(--bad); }
  .box.space {
    border: none;
    background: transparent;
    width: 14px;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-top: 6px;
  }
  .ghost {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 6px 8px;
  }
  .ghost:hover { color: var(--ink); }

    color: var(--muted);
    font-size: 13px;
  }
  .answer {
    min-height: 22px;
    font-size: 16px;
    color: var(--good);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .answer.bad { color: var(--bad); }
  footer {
    margin-top: 22px;
    color: var(--muted);
    font-size: 12px;
  }

const $ = (id) => document.getElementById(id);
const unitsEl = $("units");
const emojiEl = $("emoji");
const meaningEl = $("meaning");
const wordEl = $("word");
const boxesEl = $("boxes");
const speakEl = $("speak");
const skipEl = $("skip");
const statsEl = $("stats");
const answerEl = $("answer");

let currentUnit = 0;
let queue = [];
let current = null;
let correct = 0;
let total = 0;
let boxEls = [];       // box div elements (excluding spaces)
let typed = [];        // typed letters (length === boxEls.length when full)
let locked = false;    // lock input briefly after correct/incorrect

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderUnits() {
  unitsEl.innerHTML = "";
  UNITS.forEach((u, i) => {
    const b = document.createElement("button");
    b.className = "unit-btn" + (i === currentUnit ? " active" : "");
    b.textContent = u.name;
    b.onclick = () => { currentUnit = i; startUnit(); renderUnits(); };
    unitsEl.appendChild(b);
  });
}

function startUnit() {
  queue = shuffle(UNITS[currentUnit].words);
  correct = 0;
  total = 0;
  next();
}

function buildBoxes(word) {
  boxesEl.innerHTML = "";
  boxEls = [];
  typed = [];
  word.split("").forEach((ch) => {
    if (ch === " ") {
      const sp = document.createElement("div");
      sp.className = "box space";
      boxesEl.appendChild(sp);
      return;
    }
    const div = document.createElement("div");
    div.className = "box";
    div.dataset.expect = ch.toLowerCase();
    boxesEl.appendChild(div);
    boxEls.push(div);
  });
  updateCursor();
}

function updateCursor() {
  boxEls.forEach((b, i) => {
    b.classList.remove("cursor");
    if (i === typed.length) b.classList.add("cursor");
  });
}

function renderTyped() {
  boxEls.forEach((b, i) => {
    if (i < typed.length) {
      b.textContent = typed[i];
      b.classList.add("filled");
    } else {
      b.textContent = "";
      b.classList.remove("filled");
    }
    b.classList.remove("good", "bad");
  });
  updateCursor();
}

function handleKey(e) {
  if (locked || !current) return;
  // 忽略修饰键组合
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const key = e.key;
  if (/^[a-zA-Z]$/.test(key)) {
    if (typed.length < boxEls.length) {
      typed.push(key.toLowerCase());
      renderTyped();
      if (typed.length === boxEls.length) checkAll();
    }
    e.preventDefault();
  } else if (key === "Backspace") {
    if (typed.length > 0) {
      typed.pop();
      renderTyped();
    }
    e.preventDefault();
  } else if (key === "Enter") {
    if (typed.length === boxEls.length) checkAll();
    e.preventDefault();
  }
}

function checkAll() {
  if (!current) return;
  const got = typed.join("");
  const expect = current.en.replace(/ /g, "").toLowerCase();
  total += 1;
  if (got === expect) {
    correct += 1;
    boxEls.forEach(b => { b.classList.remove("bad", "filled", "cursor"); b.classList.add("good"); });
    answerEl.textContent = `✅ 太棒了！ ${current.en} — ${current.zh}`;
    answerEl.classList.remove("bad");
    speak(current.en);
    updateStats();
    locked = true;
    setTimeout(() => { locked = false; next(); }, 1300);
  } else {
    boxEls.forEach((b, i) => {
      if ((typed[i] || "") === expect[i]) {
        b.classList.add("good");
        b.classList.remove("bad");
      } else {
        b.classList.add("bad");
        b.classList.remove("good");
      }
    });
    boxesEl.classList.add("shake");
    setTimeout(() => boxesEl.classList.remove("shake"), 400);
    answerEl.textContent = `再试一次～`;
    answerEl.classList.add("bad");
    // 保留对的，清掉错的
    const newTyped = [];
    for (let i = 0; i < boxEls.length; i++) {
      if ((typed[i] || "") === expect[i]) {
        newTyped.push(typed[i]);
      } else {
        break;
      }
    }
    typed = newTyped;
    setTimeout(() => { renderTyped(); }, 450);
    updateStats();
  }
}

function next() {
  answerEl.textContent = "";
  answerEl.classList.remove("bad");
  if (queue.length === 0) {
    queue = shuffle(UNITS[currentUnit].words);
  }
  current = queue.shift();
  emojiEl.textContent = current.emoji;
  meaningEl.textContent = current.zh;
  wordEl.textContent = current.en;
  buildBoxes(current.en);
  updateStats();
}

function updateStats() {
  statsEl.textContent = `${correct} / ${total}`;
}

// 语音
let voice = null;
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  voice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|victoria|karen/i.test(v.name))
       || voices.find(v => /en[-_]US/i.test(v.lang))
       || voices.find(v => /^en/i.test(v.lang))
       || voices[0] || null;
}
if (typeof speechSynthesis !== "undefined") {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text) {
  if (typeof speechSynthesis === "undefined") return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.05;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

document.addEventListener("keydown", handleKey);
speakEl.addEventListener("click", () => current && speak(current.en));
skipEl.addEventListener("click", () => {
  if (!current) return;
  speak(current.en);
  setTimeout(next, 400);
});

renderUnits();
startUnit();
</script>
</body>
</html>

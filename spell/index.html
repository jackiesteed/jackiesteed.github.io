<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>三年级上 · 单词拼写</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7fbfa;
    --card: #ffffff;
    --ink: #2e7272;
    --muted: #6f8f8f;
    --accent: #2e7272;
    --accent-2: #3f8f8f;
    --accent-3: #7aa9a5;
    --good: #2e7d5b;
    --bad: #b35b4d;
    --line: #d8e8e5;
    --soft: #edf6f4;
    --shadow-lg: 0 22px 60px -28px rgba(46, 114, 114, .36), 0 10px 24px -14px rgba(46, 114, 114, .22);
    --shadow-md: 0 8px 22px rgba(46, 114, 114, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Fredoka", "Quicksand", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100vh;
    background: var(--bg);
    overflow-x: hidden;
  }
  body.menu-open { overflow: hidden; }

  .menu-toggle {
    display: none;
    position: fixed;
    left: 14px;
    top: 14px;
    z-index: 1200;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px;
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 800;
    box-shadow: var(--shadow-md);
  }

  .menu-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1090;
    background: rgba(46, 114, 114, .18);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }

  /* === sidebar === */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: rgba(255,255,255,.78);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    box-shadow: 4px 0 24px rgba(46, 114, 114, .06);
    z-index: 1100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 18px;
    border-bottom: 1px dashed rgba(46, 114, 114, .2);
    margin-bottom: 14px;
  }
  .brand-logo {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 16px rgba(46, 114, 114, .24);
  }
  .brand-title {
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.2;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .5px;
  }
  .sidebar h2 {
    margin: 4px 8px 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .units {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .unit-btn {
    border: none;
    background: transparent;
    color: var(--ink);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s cubic-bezier(.4, 0, .2, 1);
    text-align: left;
    line-height: 1.35;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
  }
  .unit-num {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--soft);
    color: var(--accent-2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all .2s;
  }
  .unit-name { flex: 1; font-size: 13px; }
  .unit-btn:hover {
    background: rgba(255, 255, 255, .8);
    transform: translateX(2px);
  }
  .unit-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 10px 24px rgba(46, 114, 114, .2);
    transform: translateX(2px);
  }
  .unit-btn.active .unit-num {
    background: rgba(255,255,255,.25);
    color: #fff;
  }

  /* === main === */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
    min-height: 100vh;
    position: relative;
  }
  .topbar {
    position: absolute;
    top: 24px;
    left: 32px;
    right: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    opacity: .7;
    letter-spacing: .5px;
  }
  .progress-pill {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: min(520px, 100%);
    background: rgba(255,255,255,.86);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.8);
    padding: 12px 16px;
    border-radius: 22px;
    font-size: 15px;
    font-weight: 800;
    color: var(--ink);
    pointer-events: auto;
    box-shadow: var(--shadow-md);
    margin: 0 0 16px;
  }
  .progress-pill::before {
    content: "";
    position: absolute;
    inset: 0;
    width: var(--progress, 0%);
    background: rgba(46, 114, 114, .12);
    transition: width .35s ease;
  }
  .progress-mascot,
  .progress-copy {
    position: relative;
    z-index: 1;
  }
  .progress-mascot {
    width: 46px;
    height: 46px;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--soft);
    font-size: 28px;
    box-shadow: 0 8px 18px rgba(46, 114, 114, .12);
  }
  .progress-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
    text-align: left;
  }
  .progress-label {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .8px;
  }
  .progress-pill .ok { color: var(--good); font-size: 20px; }
  .progress-pill .total { color: var(--accent-2); font-size: 20px; }

  @media (max-width: 640px) {
    body { display: block; }
    .menu-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .menu-backdrop { display: block; }
    body.menu-open .menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: min(280px, 84vw);
      padding: 72px 14px 16px;
      transform: translateX(-100%);
      transition: transform .22s ease;
    }
    body.menu-open .sidebar { transform: translateX(0); }
    .brand-title { font-size: 13px; }
    .brand-sub { display: block; }
    .unit-btn { padding: 9px 8px; }
    .unit-name { font-size: 13px; }
    .topbar { left: 72px; right: 16px; top: 18px; }
    .topbar h1 { font-size: 15px; }
    .main {
      min-height: 100vh;
      min-height: 100svh;
      padding: 70px 14px 24px;
    }
    .progress-pill { min-width: 0; width: 100%; max-width: 520px; }
  }

  /* === card === */
  .card {
    position: relative;
    background: #fff;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--line);
    border-radius: 40px;
    box-shadow: var(--shadow-lg);
    padding: 5vh 4vw;
    width: calc((100vw - 220px) * 0.85);
    height: 80vh;
    max-width: 1100px;
    max-height: 840px;
    min-width: 360px;
    min-height: 460px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    animation: cardIn .6s cubic-bezier(.2, .8, .3, 1.2);
  }
  .card::before {
    content: "";
    display: none;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(.94) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .card.success { animation: cardSuccess .6s cubic-bezier(.2, .8, .3, 1.4); }
  @keyframes cardSuccess {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03); box-shadow: 0 30px 70px -18px rgba(46, 114, 114, .34); }
    100% { transform: scale(1); }
  }

  .emoji {
    font-size: clamp(72px, 14vh, 180px);
    line-height: 1;
    user-select: none;
    filter: drop-shadow(0 8px 16px rgba(46, 114, 114, .12));
    transition: transform .3s;
  }
  .card.success .emoji { animation: bounce .6s ease; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-20px) scale(1.15) rotate(-5deg); }
    60% { transform: translateY(-8px) scale(1.05) rotate(3deg); }
  }
  .meaning {
    font-size: clamp(32px, 5.2vh, 64px);
    font-weight: 700;
    color: var(--ink);
  }
  .word {
    font-size: clamp(44px, 6.5vh, 80px);
    font-weight: 700;
    letter-spacing: 6px;
    margin: 0;
    color: var(--accent);
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  .boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }
  .boxes.shake { animation: shake .4s; }
  .box {
    width: clamp(54px, 8vh, 92px);
    height: clamp(66px, 10vh, 112px);
    border-radius: 18px;
    border: 3px solid rgba(46, 114, 114, .14);
    background: #fff;
    font-size: clamp(36px, 5.5vh, 60px);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: lowercase;
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    transition: all .25s cubic-bezier(.4, 0, .2, 1);
    user-select: none;
    box-shadow: 0 4px 12px rgba(46, 114, 114, .06);
  }
  .box.cursor {
    border-color: var(--accent);
    box-shadow: 0 0 0 6px rgba(46, 114, 114, .12), 0 8px 20px rgba(46, 114, 114, .18);
    transform: translateY(-4px);
    background: #fff;
  }
  .box.filled {
    border-color: rgba(46, 114, 114, .28);
    background: var(--soft);
  }
  .box.good {
    border-color: var(--good);
    background: #e8f4ef;
    color: var(--good);
    animation: popIn .35s cubic-bezier(.2, .8, .3, 1.4);
  }
  .box.bad {
    border-color: var(--bad);
    background: #f8ece8;
    color: var(--bad);
  }
  @keyframes popIn {
    0% { transform: scale(.85); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .box.space {
    border: none;
    background: transparent;
    width: 14px;
    box-shadow: none;
  }
  .typing-input {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 1px;
    height: 1px;
    opacity: .01;
    border: 0;
    padding: 0;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    font-size: 16px;
    pointer-events: none;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* === actions === */
  .actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 480px;
    margin-top: 6px;
  }
  .ghost {
    background: rgba(255,255,255,.8);
    border: 1px solid rgba(46, 114, 114, .16);
    color: var(--ink);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: inherit;
    transition: all .2s;
    box-shadow: 0 4px 12px rgba(46, 114, 114, .08);
  }
  .ghost:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(46, 114, 114, .14);
  }
  .ghost:active { transform: translateY(0); }
  .answer {
    min-height: 26px;
    font-size: 18px;
    color: var(--good);
    font-weight: 700;
    letter-spacing: .5px;
  }
  .answer.bad { color: var(--bad); }
  footer {
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .5px;
  }

  /* === confetti canvas === */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* === floating success badge === */
  .success-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: clamp(60px, 10vh, 120px);
    font-weight: 800;
    color: var(--good);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(.5);
    text-shadow: 0 8px 24px rgba(46, 114, 114, .22);
    z-index: 10;
  }
  .success-badge.show {
    animation: badgePop 1.1s cubic-bezier(.2, .8, .3, 1.4);
  }
  @keyframes badgePop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(.3) rotate(-15deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
    50%  { opacity: 1; transform: translate(-50%, -80%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(.9) rotate(0deg); }
  }

  .egg-layer {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    pointer-events: none;
    z-index: 9;
  }
  .egg-pop {
    position: absolute;
    left: 50%;
    top: 58%;
    min-width: 32px;
    height: 32px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    background: rgba(255,255,255,.88);
    border: 1px solid rgba(255,255,255,.9);
    color: var(--accent-2);
    font-size: 20px;
    font-weight: 800;
    box-shadow: 0 10px 24px rgba(46, 114, 114, .14);
    animation: eggPop var(--egg-time, 1100ms) cubic-bezier(.2, .8, .3, 1) forwards;
    transform: translate(-50%, -50%);
  }
  .egg-pop.star {
    background: transparent;
    border: none;
    box-shadow: none;
    font-size: 26px;
  }
  @keyframes eggPop {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.5) rotate(0deg);
    }
    15% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--egg-x)), calc(-50% + var(--egg-y)))
        scale(1.15)
        rotate(var(--egg-rot));
    }
  }
  .streak-badge {
    position: absolute;
    right: 32px;
    top: 26px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 14px 30px rgba(46, 114, 114, .22);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-10px) scale(.8);
    z-index: 11;
  }
  .streak-badge.show {
    animation: streakPop 1.2s cubic-bezier(.2, .8, .3, 1.25);
  }
  @keyframes streakPop {
    0%   { opacity: 0; transform: translateY(-10px) scale(.8); }
    18%  { opacity: 1; transform: translateY(0) scale(1.08); }
    70%  { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-18px) scale(.95); }
  }
  .chapter-modal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(46, 114, 114, .18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s ease;
    z-index: 10000;
  }
  .chapter-modal.show {
    opacity: 1;
    pointer-events: auto;
  }
  .chapter-dialog {
    width: min(420px, 100%);
    border-radius: 28px;
    padding: 34px 28px 28px;
    text-align: center;
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.95);
    box-shadow: 0 30px 80px rgba(46, 114, 114, .2);
    transform: translateY(16px) scale(.94);
    transition: transform .22s cubic-bezier(.2, .8, .3, 1.2);
  }
  .chapter-modal.show .chapter-dialog {
    transform: translateY(0) scale(1);
  }
  .chapter-icon {
    font-size: 70px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .chapter-title {
    margin: 0 0 10px;
    font-size: 28px;
    color: var(--ink);
  }
  .chapter-text {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }
  .chapter-action {
    border: none;
    border-radius: 999px;
    padding: 12px 24px;
    color: #fff;
    background: var(--accent);
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 12px 28px rgba(46, 114, 114, .22);
  }
  @media (max-width: 640px) {
    .card {
      width: 100%;
      min-width: 0;
      height: auto;
      min-height: calc(100vh - 190px);
      min-height: calc(100svh - 190px);
      border-radius: 28px;
      padding: 32px 14px;
    }
  }

  /* === 听写模式 sidebar === */
  .unit-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .unit-row .unit-btn { flex: 1; min-width: 0; }
  .dict-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--soft);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .18s, transform .18s;
    padding: 0;
    color: var(--accent);
  }
  .dict-btn:hover {
    background: rgba(46, 114, 114, .18);
    transform: scale(1.12);
  }

  /* === 听写 overlay === */
  .dictation-overlay {
    position: fixed;
    inset: 0;
    z-index: 10002;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s ease;
  }
  .dictation-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .dict-card {
    width: min(540px, 100%);
    background: #fff;
    border-radius: 36px;
    padding: 36px 32px 30px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    text-align: center;
  }
  .dict-top {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dict-unit-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .4px;
    text-align: left;
  }
  .dict-counter {
    font-size: clamp(38px, 9vw, 68px);
    font-weight: 800;
    color: var(--ink);
    line-height: 1.1;
  }
  .dict-counter .dict-n { color: var(--accent); }
  .dict-counter .dict-sep {
    font-size: .6em;
    color: var(--muted);
    margin: 0 8px;
  }
  .dict-status {
    font-size: clamp(17px, 3.5vw, 24px);
    font-weight: 600;
    color: var(--muted);
    min-height: 2.2em;
    line-height: 1.5;
  }
  .dict-bar-wrap {
    width: 100%;
    height: 22px;
    background: var(--soft);
    border-radius: 999px;
    overflow: hidden;
  }
  .dict-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 100%;
  }
  .dict-seconds {
    font-size: 30px;
    font-weight: 800;
    color: var(--accent-3);
    min-height: 38px;
    letter-spacing: 1px;
  }
  .dict-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  @media (max-width: 640px) {
    .dict-card {
      border-radius: 24px;
      padding: 28px 18px 22px;
      gap: 16px;
    }
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="units">单元</button>
  <div class="menu-backdrop" id="menuBackdrop"></div>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">📚</div>
      <div>

const $ = (id) => document.getElementById(id);
const unitsEl = $("units");
const emojiEl = $("emoji");
const meaningEl = $("meaning");
const wordEl = $("word");
const boxesEl = $("boxes");
const speakEl = $("speak");
const skipEl = $("skip");
const menuToggleEl = $("menuToggle");
const menuBackdropEl = $("menuBackdrop");
const typingInputEl = $("typingInput");
const progressPillEl = $("progressPill");
const progressMascotEl = $("progressMascot");
const statsEl = $("stats");
const statsTotalEl = $("statsTotal");
const answerEl = $("answer");
const cardEl = $("card");
const eggLayerEl = $("eggLayer");
const successBadgeEl = $("successBadge");
const streakBadgeEl = $("streakBadge");
const chapterModalEl = $("chapterModal");
const chapterTextEl = $("chapterText");
const chapterCloseEl = $("chapterClose");

let currentUnit = 0;
let queue = [];
let current = null;
let streak = 0;
let boxEls = [];       // box div elements (excluding spaces)
let typed = [];        // typed letters (length === boxEls.length when full)
let locked = false;    // lock input briefly after correct/incorrect
const unitProgress = UNITS.map(() => ({
  completed: new Set(),
  notified: false,
}));

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderUnits() {
  unitsEl.innerHTML = "";
  UNITS.forEach((u, i) => {
    const row = document.createElement("div");
    row.className = "unit-row";

    const b = document.createElement("button");
    b.className = "unit-btn" + (i === currentUnit ? " active" : "");
    // 提取标题部分（"Unit X · Name" → "Name"）
    const parts = u.name.split("·");
    const subtitle = (parts[1] || u.name).trim();
    b.innerHTML = `<span class="unit-num">${i + 1}</span><span class="unit-name">${subtitle}</span>`;
    b.onclick = () => {
      closeMenu();
      closeChapterModal();
      currentUnit = i;
      startUnit();
      renderUnits();
      focusTypingInput();
    };

    const d = document.createElement("button");
    d.className = "dict-btn";
    d.title = "听写模式";
    d.textContent = "🎧";
    d.onclick = (e) => {
      e.stopPropagation();
      closeMenu();
      startDictation(i);
    };

    row.appendChild(b);
    row.appendChild(d);
    unitsEl.appendChild(row);
  });
}

function startUnit() {
  queue = shuffle(remainingWordsForUnit(currentUnit));
  streak = 0;
  next();
}

function wordKey(word) {
  return word.trim().toLowerCase();
}

function currentProgress() {
  return unitProgress[currentUnit];
}

function remainingWordsForUnit(unitIndex) {
  const progress = unitProgress[unitIndex];
  return UNITS[unitIndex].words.filter(word => !progress.completed.has(wordKey(word.en)));
}

function currentUnitTotal() {
  return UNITS[currentUnit].words.length;
}

function currentCompletedCount() {
  return currentProgress().completed.size;
}

function buildBoxes(word) {
  boxesEl.innerHTML = "";
  boxEls = [];
  typed = [];
  word.split("").forEach((ch) => {
    if (ch === " ") {
      const sp = document.createElement("div");
      sp.className = "box space";
      boxesEl.appendChild(sp);
      return;
    }
    const div = document.createElement("div");
    div.className = "box";
    div.dataset.expect = ch.toLowerCase();
    boxesEl.appendChild(div);
    boxEls.push(div);
  });
  updateCursor();
}

function updateCursor() {
  boxEls.forEach((b, i) => {
    b.classList.remove("cursor");
    if (i === typed.length) b.classList.add("cursor");
  });
}

function renderTyped() {
  boxEls.forEach((b, i) => {
    if (i < typed.length) {
      b.textContent = typed[i];
      b.classList.add("filled");
    } else {
      b.textContent = "";
      b.classList.remove("filled");
    }
    b.classList.remove("good", "bad");
  });
  updateCursor();
}

function canType() {
  if (chapterModalEl.classList.contains("show")) {
    return false;
  }
  return !locked && !!current;
}

function typeLetter(letter) {
  if (!canType() || typed.length >= boxEls.length) return;
  typed.push(letter.toLowerCase());
  renderTyped();
  if (typed.length === boxEls.length) checkAll();
}

function eraseLetter() {
  if (!canType() || typed.length === 0) return;
  typed.pop();
  renderTyped();
}

function submitTyped() {
  if (!canType() || typed.length !== boxEls.length) return;
  checkAll();
}

function handleKey(e) {
  if (chapterModalEl.classList.contains("show")) {
    if (e.key === "Enter" || e.key === "Escape") {
      closeChapterModal();
      e.preventDefault();
    }
    return;
  }
  if (e.target === typingInputEl && /^[a-zA-Z]$/.test(e.key)) return;
  if (!canType()) return;
  // 忽略修饰键组合
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const key = e.key;
  if (/^[a-zA-Z]$/.test(key)) {
    typeLetter(key);
    e.preventDefault();
  } else if (key === "Backspace") {
    eraseLetter();
    e.preventDefault();
  } else if (key === "Enter") {
    submitTyped();
    e.preventDefault();
  }
}

function handleTextInput(e) {
  const value = e.target.value;
  e.target.value = "";
  if (!value) return;
  value.replace(/[^a-zA-Z]/g, "").split("").forEach(typeLetter);
}

function checkAll() {
  if (!current) return;
  const got = typed.join("");
  const expect = current.en.replace(/ /g, "").toLowerCase();
  if (got === expect) {
    streak += 1;
    const progress = currentProgress();
    progress.completed.add(wordKey(current.en));
    boxEls.forEach(b => { b.classList.remove("bad", "filled", "cursor"); b.classList.add("good"); });
    answerEl.textContent = `太棒了！ ${current.en} — ${current.zh}`;
    answerEl.classList.remove("bad");
    speakWord(current);
    updateStats();
    celebrate(current.en, streak);
    maybeShowChapterComplete();
    locked = true;
    setTimeout(() => { locked = false; next(); }, 1500);
  } else {
    streak = 0;
    boxEls.forEach((b, i) => {
      if ((typed[i] || "") === expect[i]) {
        b.classList.add("good");
        b.classList.remove("bad");
      } else {
        b.classList.add("bad");
        b.classList.remove("good");
      }
    });
    boxesEl.classList.add("shake");
    setTimeout(() => boxesEl.classList.remove("shake"), 400);
    answerEl.textContent = `再试一次～`;
    answerEl.classList.add("bad");
    // 保留对的，清掉错的
    const newTyped = [];
    for (let i = 0; i < boxEls.length; i++) {
      if ((typed[i] || "") === expect[i]) {
        newTyped.push(typed[i]);
      } else {
        break;
      }
    }
    typed = newTyped;
    setTimeout(() => { renderTyped(); }, 450);
    updateStats();
  }
}

function next() {
  answerEl.textContent = "";
  answerEl.classList.remove("bad");
  if (queue.length === 0) {
    queue = shuffle(remainingWordsForUnit(currentUnit));
  }
  if (queue.length === 0) {
    showUnitCompleteScreen();
    return;
  }
  current = queue.shift();
  emojiEl.textContent = current.emoji;
  meaningEl.textContent = current.zh;
  wordEl.textContent = current.en;
  buildBoxes(current.en);
  updateStats();
}

function updateStats() {
  const completed = currentCompletedCount();
  const total = currentUnitTotal();
  const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
  statsEl.textContent = completed;
  statsTotalEl.textContent = total;
  progressPillEl.style.setProperty("--progress", `${percent}%`);
  progressMascotEl.textContent = completed >= total ? "🏆" : completed > 0 ? "🌟" : "🐣";
}

function showUnitCompleteScreen() {
  current = null;
  locked = false;
  typed = [];
  boxEls = [];
  emojiEl.textContent = "🏆";
  meaningEl.textContent = "本章完成！";
  wordEl.textContent = "Great job";
  boxesEl.innerHTML = "";
  answerEl.textContent = `你已经打对本章全部 ${currentUnitTotal()} 个单词。`;
  answerEl.classList.remove("bad");
  updateStats();
}

function maybeShowChapterComplete() {
  const progress = currentProgress();
  const unitTotal = UNITS[currentUnit].words.length;
  if (progress.notified || progress.completed.size < unitTotal) return;

  progress.notified = true;
  const completedUnit = currentUnit;
  setTimeout(() => {
    const unitName = UNITS[completedUnit].name;
    chapterTextEl.textContent = `你已经完成 ${unitTotal} / ${unitTotal} 个单词：${unitName}`;
    chapterModalEl.classList.add("show");
    spawnConfetti(260);
  }, 650);
}

function closeChapterModal() {
  chapterModalEl.classList.remove("show");
  focusTypingInput();
}

function setMenuOpen(open) {
  document.body.classList.toggle("menu-open", open);
  menuToggleEl.setAttribute("aria-expanded", String(open));
}

function closeMenu() {
  setMenuOpen(false);
}

function toggleMenu() {
  setMenuOpen(!document.body.classList.contains("menu-open"));
}

function focusTypingInput() {
  if (chapterModalEl.classList.contains("show")) return;
  try {
    typingInputEl.focus({ preventScroll: true });
  } catch (e) {
    typingInputEl.focus();
  }
}

// 语音
let voice = null;
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  voice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|victoria|karen/i.test(v.name))
       || voices.find(v => /en[-_]US/i.test(v.lang))
       || voices.find(v => /^en/i.test(v.lang))
       || voices[0] || null;
}
if (typeof speechSynthesis !== "undefined") {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text) {
  if (typeof speechSynthesis === "undefined") return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.05;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

function speakWord(word) {
  speak(word.say || word.en);
}

// === 彩蛋：confetti + 成功徽章 + chime ===
const confettiCanvas = $("confetti");
const cctx = confettiCanvas.getContext("2d");
let confettiParticles = [];
let confettiRunning = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener("resize", resizeConfetti);

const CONFETTI_COLORS = ["#2e7272", "#3f8f8f", "#7aa9a5", "#2e7d5b", "#d6a348", "#b35b4d"];

function spawnConfetti(count = 140) {
  const cardRect = cardEl.getBoundingClientRect();
  const cx = cardRect.left + cardRect.width / 2;
  const cy = cardRect.top + cardRect.height / 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 6 + Math.random() * 10;
    confettiParticles.push({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy + (Math.random() - 0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      gravity: 0.28 + Math.random() * 0.12,
      size: 6 + Math.random() * 8,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.4,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      shape: Math.random() < 0.5 ? "rect" : "circle",
      life: 0,
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    requestAnimationFrame(tickConfetti);
  }
}

function tickConfetti() {
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => {
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life += 1;
    const alpha = Math.max(0, 1 - p.life / 140);
    if (alpha <= 0 || p.y > confettiCanvas.height + 50) return false;
    cctx.save();
    cctx.globalAlpha = alpha;
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot);
    cctx.fillStyle = p.color;
    if (p.shape === "rect") {
      cctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
    } else {
      cctx.beginPath();
      cctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      cctx.fill();
    }
    cctx.restore();
    return true;
  });
  if (confettiParticles.length > 0) {
    requestAnimationFrame(tickConfetti);
  } else {
    confettiRunning = false;
  }
}

// 短促的"叮"音效
let audioCtx = null;
function playChime() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const notes = [880, 1175, 1568]; // A5, D6, G6 — 上行琶音
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, now + i * 0.08);
      g.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + i * 0.08);
      o.stop(now + i * 0.08 + 0.4);
    });
  } catch (e) {}
}

const SUCCESS_EMOJIS = ["🎉", "⭐", "💯", "✨", "🌟", "🏆", "🎊"];
const EGG_SPARKS = ["⭐", "✨", "💫", "🌟", "🎈"];

function restartAnimation(el, className) {
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
}

function createEggPop(text, index, totalItems, className = "") {
  const el = document.createElement("span");
  el.className = `egg-pop ${className}`.trim();
  el.textContent = text;

  const spread = totalItems <= 1 ? 0 : (index / (totalItems - 1)) - 0.5;
  const randomDrift = (Math.random() - 0.5) * 70;
  const x = spread * 440 + randomDrift;
  const y = -150 - Math.random() * 150;
  const rot = (Math.random() - 0.5) * 100;
  el.style.setProperty("--egg-x", `${x}px`);
  el.style.setProperty("--egg-y", `${y}px`);
  el.style.setProperty("--egg-rot", `${rot}deg`);
  el.style.setProperty("--egg-time", `${950 + Math.random() * 350}ms`);
  eggLayerEl.appendChild(el);
  el.addEventListener("animationend", () => el.remove(), { once: true });
}

function burstWord(word) {
  const letters = word.replace(/ /g, "").split("").slice(0, 10);
  letters.forEach((letter, index) => createEggPop(letter, index, letters.length));

  const sparkleCount = Math.min(6, Math.max(3, letters.length));
  for (let i = 0; i < sparkleCount; i++) {
    const sparkle = EGG_SPARKS[Math.floor(Math.random() * EGG_SPARKS.length)];
    createEggPop(sparkle, i, sparkleCount, "star");
  }
}

function showStreak(streakCount) {
  if (streakCount < 3) return;
  streakBadgeEl.textContent = streakCount % 5 === 0
    ? `隐藏奖励：连对 ${streakCount} 个！`
    : `连对 ${streakCount} 个！`;
  restartAnimation(streakBadgeEl, "show");
}

function celebrate(word, streakCount) {
  const confettiCount = streakCount >= 5 && streakCount % 5 === 0 ? 220 : 140;
  spawnConfetti(confettiCount);
  burstWord(word);
  showStreak(streakCount);
  playChime();
  restartAnimation(cardEl, "success");
  successBadgeEl.textContent = SUCCESS_EMOJIS[Math.floor(Math.random() * SUCCESS_EMOJIS.length)];
  restartAnimation(successBadgeEl, "show");
}

// ===== 听写模式 =====
let dictActive = false;
let dictGen = 0; // 每次取消/重启时递增，用于使旧的 async 流程失效
let dictWordList = [];
let dictWordIndex = 0;
let dictPaused = false;
let dictPhase = 'idle';
let dictRAF = null;
let dictCdRemaining = 0;
let dictCdTotal = 0;

const dictOverlayEl   = $('dictationOverlay');
const dictUnitLabelEl = $('dictUnitLabel');
const dictIdxEl       = $('dictIdx');
const dictTotalEl     = $('dictTotal');
const dictStatusEl    = $('dictStatus');
const dictBarEl       = $('dictBar');
const dictSecondsEl   = $('dictSeconds');
const dictPauseBtnEl  = $('dictPauseBtn');
const dictRepeatBtnEl = $('dictRepeatBtn');
const dictNextBtnEl   = $('dictNextBtn');
const dictExitBtnEl   = $('dictExitBtn');

// 异步朗读：en-US 或 zh-CN，结束后 resolve
function dictSpeakAsync(text, lang, gen) {
  return new Promise(resolve => {
    if (typeof speechSynthesis === 'undefined' || dictGen !== gen) { resolve(); return; }
    // Chrome 有 bug：cancel() 紧接 speak() 偶尔会重放上一句，加一小段延时规避
    speechSynthesis.cancel();
    setTimeout(() => {
      if (dictGen !== gen || !dictActive) { resolve(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang  = lang;
      u.rate  = 0.82;
      if (lang === 'en-US' && voice) u.voice = voice;
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      u.onend  = finish;
      u.onerror = finish;
      // 浏览器 onend 不可靠，加超时兜底
      const ms = lang === 'zh-CN'
        ? Math.max(1800, text.length * 350 + 500)
        : Math.max(1400, text.length * 130 + 600);
      setTimeout(finish, ms);
      speechSynthesis.speak(u);
    }, 120);
  });
}

// 简单延迟（不受 gen 控制，但调用方会 check gen）
function dictDelay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// 倒计时（RAF 驱动，支持暂停，受 gen 控制）
function dictCountdownAsync(durationMs, gen) {
  return new Promise(resolve => {
    if (dictGen !== gen) { resolve(); return; }
    dictCdTotal     = durationMs;
    dictCdRemaining = durationMs;
    let lastTime = null;

    function tick(now) {
      if (!dictActive || dictGen !== gen) { resolve(); return; }
      if (lastTime !== null && !dictPaused) {
        dictCdRemaining = Math.max(0, dictCdRemaining - (now - lastTime));
      }
      lastTime = now;

      const ratio = dictCdTotal > 0 ? dictCdRemaining / dictCdTotal : 0;
      dictBarEl.style.width = `${ratio * 100}%`;
      dictSecondsEl.textContent = dictCdRemaining > 0
        ? Math.ceil(dictCdRemaining / 1000) + ' 秒' : '';

      if (dictCdRemaining <= 0) { resolve(); return; }
      dictRAF = requestAnimationFrame(tick);
    }
    dictRAF = requestAnimationFrame(tick);
  });
}

function dictCancelCurrent() {
  dictGen++;
  if (dictRAF) { cancelAnimationFrame(dictRAF); dictRAF = null; }
  if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
}

async function startDictation(unitIdx) {
  dictCancelCurrent();
  dictActive     = true;
  dictWordList   = UNITS[unitIdx].words.slice();
  dictWordIndex  = 0;
  dictPaused     = false;
  dictPhase      = 'idle';

  dictUnitLabelEl.textContent  = UNITS[unitIdx].name + ' · 听写';
  dictTotalEl.textContent      = dictWordList.length;
  dictIdxEl.textContent        = 1;
  dictStatusEl.textContent     = '准备中...';
  dictBarEl.style.width        = '100%';
  dictSecondsEl.textContent    = '';
  dictPauseBtnEl.textContent   = '⏸ 暂停';

  dictOverlayEl.classList.add('show');

  const gen = dictGen;
  await dictDelay(700);
  if (dictGen !== gen || !dictActive) return;
  await dictRunWord(gen);
}

async function dictRunWord(gen) {
  while (dictActive && dictGen === gen) {
    if (dictWordIndex >= dictWordList.length) {
      dictFinish(); return;
    }

    const word = dictWordList[dictWordIndex];
    dictIdxEl.textContent     = dictWordIndex + 1;
    dictSecondsEl.textContent = '';
    dictBarEl.style.width     = '100%';

    // ① 朗读英文
    dictPhase = 'speak_en';
    dictStatusEl.textContent = '🔊 请听单词...';
    await dictSpeakAsync(word.say || word.en, 'en-US', gen);
    if (dictGen !== gen || !dictActive) return;
    await dictDelay(400);
    if (dictGen !== gen || !dictActive) return;

    // ② 朗读中文
    dictPhase = 'speak_zh';
    dictStatusEl.textContent = '🇨🇳 ' + word.zh;
    await dictSpeakAsync(word.zh, 'zh-CN', gen);
    if (dictGen !== gen || !dictActive) return;
    await dictDelay(400);
    if (dictGen !== gen || !dictActive) return;

    // ③ 倒计时（孩子书写）
    dictPhase = 'countdown';
    dictStatusEl.textContent = '✏️ 请写下这个单词';
    const letters  = word.en.replace(/ /g, '').length;
    const duration = letters * 2000;
    await dictCountdownAsync(duration, gen);
    if (dictGen !== gen || !dictActive) return;

    dictWordIndex++;
  }
}

function dictFinish() {
  dictPhase = 'done';
  dictStatusEl.textContent  = '🎉 全部听写完成！';
  dictBarEl.style.width     = '0%';
  dictSecondsEl.textContent = '';
  dictIdxEl.textContent     = dictWordList.length;
}

function dictExit() {
  dictCancelCurrent();
  dictActive = false;
  dictOverlayEl.classList.remove('show');
  focusTypingInput();
}

function dictTogglePause() {
  if (!dictActive) return;
  dictPaused = !dictPaused;
  dictPauseBtnEl.textContent = dictPaused ? '▶ 继续' : '⏸ 暂停';
  if (dictPaused) {
    dictStatusEl.textContent = '⏸ 已暂停';
  } else {
    if (dictPhase === 'countdown') dictStatusEl.textContent = '✏️ 请写下这个单词';
    else dictStatusEl.textContent = '🔊 请听单词...';
  }
}

function dictRepeat() {
  if (!dictActive) return;
  dictCancelCurrent();
  dictActive = true;
  dictPaused = false;
  dictPauseBtnEl.textContent = '⏸ 暂停';
  const gen = dictGen;
  setTimeout(() => { if (dictGen === gen && dictActive) dictRunWord(gen); }, 300);
}

function dictSkip() {
  if (!dictActive) return;
  dictCancelCurrent();
  dictActive = true;
  dictPaused = false;
  dictPauseBtnEl.textContent = '⏸ 暂停';
  dictWordIndex++;
  const gen = dictGen;
  setTimeout(() => { if (dictGen === gen && dictActive) dictRunWord(gen); }, 300);
}

dictPauseBtnEl.addEventListener('click',  dictTogglePause);
dictRepeatBtnEl.addEventListener('click', dictRepeat);
dictNextBtnEl.addEventListener('click',   dictSkip);
dictExitBtnEl.addEventListener('click',   dictExit);

document.addEventListener("keydown", handleKey);
typingInputEl.addEventListener("input", handleTextInput);
cardEl.addEventListener("pointerdown", focusTypingInput);
progressPillEl.addEventListener("pointerdown", focusTypingInput);
menuToggleEl.addEventListener("click", toggleMenu);
menuBackdropEl.addEventListener("click", closeMenu);
speakEl.addEventListener("click", () => current && speakWord(current));
skipEl.addEventListener("click", () => {
  if (!current) return;
  speakWord(current);
  focusTypingInput();
  setTimeout(next, 400);
});
chapterCloseEl.addEventListener("click", closeChapterModal);
chapterModalEl.addEventListener("click", (e) => {
  if (e.target === chapterModalEl) closeChapterModal();
});

renderUnits();
startUnit();
</script>

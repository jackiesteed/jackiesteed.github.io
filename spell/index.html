<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>三年级上 · 单词拼写</title>
<style>
  :root {
    --bg: #fff8ec;
    --card: #ffffff;
    --ink: #2b2b3a;
    --muted: #8a8aa0;
    --accent: #ff9f43;
    --good: #2ecc71;
    --bad: #e74c3c;
    --shadow: 0 10px 30px rgba(60, 50, 30, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #ffe9c2 0%, var(--bg) 60%) fixed;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  h1 {
    margin: 6px 0 14px;
    font-size: 22px;
    letter-spacing: .5px;
  }
  .units {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    max-width: 720px;
  }
  .unit-btn {
    border: 2px solid #ffd9a3;
    background: #fff;
    color: var(--ink);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .unit-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .card {
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
    width: min(520px, 100%);
    text-align: center;
  }
  .emoji {
    font-size: 72px;
    line-height: 1;
    margin: 6px 0 4px;
    user-select: none;
  }
  .meaning {
    font-size: 26px;
    font-weight: 600;
    margin: 6px 0 2px;
  }
  .word {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    margin: 6px 0 14px;
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 6px;
  }
  .boxes.shake { animation: shake .35s; }
  .box {
    width: 44px;
    height: 54px;
    border-radius: 12px;
    border: 2px solid #eee;
    background: #fff;
    font-size: 28px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: lowercase;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    transition: all .15s;
    user-select: none;
  }
  .box.cursor {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,159,67,.18);
    transform: translateY(-2px);
  }
  .box.filled { border-color: #ffd9a3; background: #fff8ec; }
  .box.good { border-color: var(--good); background: #e9f9ee; color: var(--good); }
  .box.bad { border-color: var(--bad); background: #fdecea; color: var(--bad); }
  .box.space {
    border: none;
    background: transparent;
    width: 14px;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 8px;
  }
  .ghost {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 6px 8px;
  }
  .ghost:hover { color: var(--ink); }
  .stats {
    color: var(--muted);
    font-size: 13px;
  }
  .answer {
    margin-top: 14px;
    min-height: 22px;
    font-size: 16px;
    color: var(--good);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .answer.bad { color: var(--bad); }
  footer {
    margin-top: 22px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
  <h1>📚 三年级上 · 学单词（人教新起点）</h1>
  <div class="units" id="units"></div>

  <div class="card">
    <div class="emoji" id="emoji">🐣</div>
    <div class="meaning" id="meaning">准备好了吗？</div>
    <div class="word" id="word">— — —</div>
    <div class="boxes" id="boxes"></div>
    <div class="answer" id="answer"></div>
    <div class="actions">
      <button class="ghost" id="speak">🔊 听一听</button>
      <span class="stats" id="stats">0 / 0</span>
      <button class="ghost" id="skip">跳过 →</button>
    </div>
  </div>

  <footer>拼对了会自动朗读 · 回车提交</footer>

<script>
// 人教新起点 (一年级起点) 英语 三年级上册 词汇
const UNITS = [
  {
    name: "Unit 1 · Myself",
    words: [
      { en: "myself",       zh: "我自己",   emoji: "🙋" },
      { en: "new",          zh: "新的",     emoji: "✨" },
      { en: "name",         zh: "名字",     emoji: "📛" },
      { en: "class",        zh: "班级",     emoji: "👨‍🏫" },
      { en: "Ms",           zh: "女士",     emoji: "👩" },
      { en: "Mr",           zh: "先生",     emoji: "👨" },
      { en: "old",          zh: "（年龄）岁的", emoji: "🎂" },
      { en: "school",       zh: "学校",     emoji: "🏫" },
      { en: "phone",        zh: "电话",     emoji: "📞" },
      { en: "number",       zh: "号码",     emoji: "🔢" },
      { en: "primary school", zh: "小学",   emoji: "🎓" },
    ],
  },
  {
    name: "Unit 2 · My Body",
    words: [
      { en: "body",   zh: "身体",   emoji: "🧍" },
      { en: "head",   zh: "头",     emoji: "👤" },
      { en: "hair",   zh: "头发",   emoji: "💇" },
      { en: "finger", zh: "手指",   emoji: "👆" },
      { en: "neck",   zh: "脖子",   emoji: "🦒" },
      { en: "feet",   zh: "脚（复数）", emoji: "🦶" },
      { en: "monster",zh: "妖怪",   emoji: "👹" },
      { en: "hurt",   zh: "受伤",   emoji: "🤕" },
      { en: "toe",    zh: "脚趾",   emoji: "👣" },
      { en: "bad",    zh: "不好的", emoji: "👎" },
      { en: "feel",   zh: "感觉",   emoji: "💭" },
    ],
  },
  {
    name: "Unit 3 · Food",
    words: [
      { en: "food",    zh: "食物",   emoji: "🍽️" },
      { en: "fridge",  zh: "冰箱",   emoji: "🧊" },
      { en: "beef",    zh: "牛肉",   emoji: "🥩" },
      { en: "bread",   zh: "面包",   emoji: "🍞" },
      { en: "sausage", zh: "香肠",   emoji: "🌭" },
      { en: "tomato",  zh: "西红柿", emoji: "🍅" },
      { en: "potato",  zh: "土豆",   emoji: "🥔" },
      { en: "carrot",  zh: "胡萝卜", emoji: "🥕" },
      { en: "some",    zh: "一些",   emoji: "✋" },
    ],
  },
  {
    name: "Unit 5 · Pets",
    words: [
      { en: "pet",      zh: "宠物",   emoji: "🐾" },
      { en: "turtle",   zh: "乌龟",   emoji: "🐢" },
      { en: "parrot",   zh: "鹦鹉",   emoji: "🦜" },
      { en: "dog",      zh: "狗",     emoji: "🐶" },
      { en: "cat",      zh: "猫",     emoji: "🐱" },
      { en: "goldfish", zh: "金鱼",   emoji: "🐠" },
      { en: "monkey",   zh: "猴子",   emoji: "🐵" },
      { en: "rabbit",   zh: "兔子",   emoji: "🐰" },
      { en: "chicken",  zh: "小鸡",   emoji: "🐤" },
      { en: "smart",    zh: "聪明的", emoji: "🧠" },
      { en: "cute",     zh: "可爱的", emoji: "🥰" },
    ],
  },
  {
    name: "Unit 6 · Clothes",
    words: [
      { en: "clothes",  zh: "服装",   emoji: "👕" },
      { en: "cap",      zh: "帽子",   emoji: "🧢" },
      { en: "scarf",    zh: "围巾",   emoji: "🧣" },
      { en: "vest",     zh: "背心",   emoji: "🦺" },
      { en: "gloves",   zh: "手套",   emoji: "🧤" },
      { en: "jeans",    zh: "牛仔裤", emoji: "👖" },
      { en: "sneakers", zh: "运动鞋", emoji: "👟" },
      { en: "wear",     zh: "穿",     emoji: "🧥" },
    ],
  },
  {
    name: "Unit 7 · Birthday",
    words: [
      { en: "birthday",  zh: "生日",   emoji: "🎂" },
      { en: "January",   zh: "一月",   emoji: "❄️" },
      { en: "February",  zh: "二月",   emoji: "💝" },
      { en: "March",     zh: "三月",   emoji: "🌱" },
      { en: "April",     zh: "四月",   emoji: "🌸" },
      { en: "May",       zh: "五月",   emoji: "🌷" },
      { en: "June",      zh: "六月",   emoji: "☀️" },
      { en: "July",      zh: "七月",   emoji: "🏖️" },
      { en: "August",    zh: "八月",   emoji: "🌻" },
      { en: "September", zh: "九月",   emoji: "🍂" },
      { en: "October",   zh: "十月",   emoji: "🎃" },
      { en: "November",  zh: "十一月", emoji: "🦃" },
      { en: "December",  zh: "十二月", emoji: "🎄" },
    ],
  },
];

const $ = (id) => document.getElementById(id);
const unitsEl = $("units");
const emojiEl = $("emoji");
const meaningEl = $("meaning");
const wordEl = $("word");
const boxesEl = $("boxes");
const speakEl = $("speak");
const skipEl = $("skip");
const statsEl = $("stats");
const answerEl = $("answer");

let currentUnit = 0;
let queue = [];
let current = null;
let correct = 0;
let total = 0;
let boxEls = [];       // box div elements (excluding spaces)
let typed = [];        // typed letters (length === boxEls.length when full)
let locked = false;    // lock input briefly after correct/incorrect

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderUnits() {
  unitsEl.innerHTML = "";
  UNITS.forEach((u, i) => {
    const b = document.createElement("button");
    b.className = "unit-btn" + (i === currentUnit ? " active" : "");
    b.textContent = u.name;
    b.onclick = () => { currentUnit = i; startUnit(); renderUnits(); };
    unitsEl.appendChild(b);
  });
}

function startUnit() {
  queue = shuffle(UNITS[currentUnit].words);
  correct = 0;
  total = 0;
  next();
}

function buildBoxes(word) {
  boxesEl.innerHTML = "";
  boxEls = [];
  typed = [];
  word.split("").forEach((ch) => {
    if (ch === " ") {
      const sp = document.createElement("div");
      sp.className = "box space";
      boxesEl.appendChild(sp);
      return;
    }
    const div = document.createElement("div");
    div.className = "box";
    div.dataset.expect = ch.toLowerCase();
    boxesEl.appendChild(div);
    boxEls.push(div);
  });
  updateCursor();
}

function updateCursor() {
  boxEls.forEach((b, i) => {
    b.classList.remove("cursor");
    if (i === typed.length) b.classList.add("cursor");
  });
}

function renderTyped() {
  boxEls.forEach((b, i) => {
    if (i < typed.length) {
      b.textContent = typed[i];
      b.classList.add("filled");
    } else {
      b.textContent = "";
      b.classList.remove("filled");
    }
    b.classList.remove("good", "bad");
  });
  updateCursor();
}

function handleKey(e) {
  if (locked || !current) return;
  // 忽略修饰键组合
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const key = e.key;
  if (/^[a-zA-Z]$/.test(key)) {
    if (typed.length < boxEls.length) {
      typed.push(key.toLowerCase());
      renderTyped();
      if (typed.length === boxEls.length) checkAll();
    }
    e.preventDefault();
  } else if (key === "Backspace") {
    if (typed.length > 0) {
      typed.pop();
      renderTyped();
    }
    e.preventDefault();
  } else if (key === "Enter") {
    if (typed.length === boxEls.length) checkAll();
    e.preventDefault();
  }
}

function checkAll() {
  if (!current) return;
  const got = typed.join("");
  const expect = current.en.replace(/ /g, "").toLowerCase();
  total += 1;
  if (got === expect) {
    correct += 1;
    boxEls.forEach(b => { b.classList.remove("bad", "filled", "cursor"); b.classList.add("good"); });
    answerEl.textContent = `✅ 太棒了！ ${current.en} — ${current.zh}`;
    answerEl.classList.remove("bad");
    speak(current.en);
    updateStats();
    locked = true;
    setTimeout(() => { locked = false; next(); }, 1300);
  } else {
    boxEls.forEach((b, i) => {
      if ((typed[i] || "") === expect[i]) {
        b.classList.add("good");
        b.classList.remove("bad");
      } else {
        b.classList.add("bad");
        b.classList.remove("good");
      }
    });
    boxesEl.classList.add("shake");
    setTimeout(() => boxesEl.classList.remove("shake"), 400);
    answerEl.textContent = `再试一次～`;
    answerEl.classList.add("bad");
    // 保留对的，清掉错的
    const newTyped = [];
    for (let i = 0; i < boxEls.length; i++) {
      if ((typed[i] || "") === expect[i]) {
        newTyped.push(typed[i]);
      } else {
        break;
      }
    }
    typed = newTyped;
    setTimeout(() => { renderTyped(); }, 450);
    updateStats();
  }
}

function next() {
  answerEl.textContent = "";
  answerEl.classList.remove("bad");
  if (queue.length === 0) {
    queue = shuffle(UNITS[currentUnit].words);
  }
  current = queue.shift();
  emojiEl.textContent = current.emoji;
  meaningEl.textContent = current.zh;
  wordEl.textContent = current.en;
  buildBoxes(current.en);
  updateStats();
}

function updateStats() {
  statsEl.textContent = `${correct} / ${total}`;
}

// 语音
let voice = null;
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  voice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|victoria|karen/i.test(v.name))
       || voices.find(v => /en[-_]US/i.test(v.lang))
       || voices.find(v => /^en/i.test(v.lang))
       || voices[0] || null;
}
if (typeof speechSynthesis !== "undefined") {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text) {
  if (typeof speechSynthesis === "undefined") return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.85;
    u.pitch = 1.05;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

document.addEventListener("keydown", handleKey);
speakEl.addEventListener("click", () => current && speak(current.en));
skipEl.addEventListener("click", () => {
  if (!current) return;
  speak(current.en);
  setTimeout(next, 400);
});

renderUnits();
startUnit();
</script>
</body>
</html>
